name: Weekly PSI snapshot

on:
  schedule:
    # GitHub cron is UTC. 13:07 UTC = 7:07 CST (winter) / 8:07 CDT (summer).
    # Using :07 minute instead of :00 — GitHub Actions delays or drops
    # scheduled runs that fire at the top of an hour due to high load.
    - cron: '7 13 * * 3'
  workflow_dispatch:        # manual trigger from the Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to commit and push changes back to the repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - client: smashing
            cf_project: psi-dashboard-smashing-demo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch repo changes (PRs / commits)
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: ./scripts/fetch-changes.sh ${{ matrix.client }}

      - name: Fetch PSI scores + build snapshot
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: ./scripts/run-psi.sh ${{ matrix.client }}

      - name: Record rrweb replays
        run: ./scripts/run-rrweb.sh ${{ matrix.client }} $(date +%Y-%m-%d)

      - name: Build deploy folder
        run: ./scripts/publish.sh ${{ matrix.client }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist/${{ matrix.client }}
            --project-name=${{ matrix.cf_project }}
            --branch=main

      - name: Commit new snapshot back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clients/${{ matrix.client }}/snapshots/

          if ! git diff --cached --quiet; then
            git commit -m "snapshot: ${{ matrix.client }} $(date +%Y-%m-%d)"

            # Diagnostic: show what's in the working tree before push attempt.
            echo "--- git status before push ---"
            git status --short
            echo "--------------------------------"

            # --autostash handles any untracked or modified files that would
            # otherwise block the rebase. Multiple matrix jobs may also race
            # to push to main; retry loop handles non-fast-forward rejects.
            PUSHED=0
            for i in {1..5}; do
              if git pull --rebase --autostash origin main && git push origin main; then
                PUSHED=1
                break
              fi
              sleep 5
            done
            if [ "$PUSHED" = "0" ]; then
              echo "ERROR: failed to push snapshot back to repo after 5 retries"
              exit 1
            fi
          fi
